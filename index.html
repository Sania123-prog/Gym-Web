<!DOCTYPE html>
<html>
<head>
<title>Gym Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial;
    scroll-behavior:smooth;
}

nav{
    background:linear-gradient(to right,#ff4d4d,#ff944d);
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    text-decoration:underline;
}

section{
    padding:50px;
    text-align:center;
}

#home{
    background:linear-gradient(#ffe6e6,#ffffff);
}

#facilities{
    background:linear-gradient(#e6f7ff,#ffffff);
}

#services{
    background:linear-gradient(#e6ffe6,#ffffff);
}

#plans{
    background:linear-gradient(#fff5e6,#ffffff);
}

#contact{
    background:linear-gradient(#f2e6ff,#ffffff);
}

.box{
    background:white;
    border-radius:10px;
    padding:20px;
    margin:15px;
    display:inline-block;
    width:220px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.box:hover{
    transform:scale(1.05);
}

h1{
    animation:fadeIn 2s;
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

input,textarea{
    width:80%;
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:10px 20px;
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e60000;
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#facilities">Facilities</a>
    <a href="#services">Services</a>
    <a href="#plans">Plans</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home">
    <h1>Welcome to My Gym</h1>
    <p>Stay fit, stay strong</p>
</section>

<section id="facilities">
    <h2>Facilities</h2>
    <div class="box">Gym Equipment</div>
    <div class="box">Cardio Area</div>
    <div class="box">Yoga Room</div>
</section>

<section id="services">
    <h2>Services</h2>
    <div class="box">Personal Training</div>
    <div class="box">Zumba</div>
    <div class="box">Diet Plan</div>
</section>

<section id="plans">
    <h2>Membership Plans</h2>
    <div class="box">
        <h3>Basic</h3>
        <p>₹500/month</p>
    </div>
    <div class="box">
        <h3>Standard</h3>
        <p>₹1000/month</p>
    </div>
    <div class="box">
        <h3>Premium</h3>
        <p>₹1500/month</p>
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <input type="text" placeholder="Name"><br>
    <input type="email" placeholder="Email"><br>
    <textarea placeholder="Message"></textarea><br>
    <button onclick="send()">Submit</button>
</section>

<script>
function send(){
    alert("Message Sent Successfully");
}
</script>

</body>
</html>
